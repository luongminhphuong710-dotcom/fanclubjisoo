<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=http://localhost:3000" />
    <title>Open JISOO Fanclub</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --ink: #171717;
        --muted: #6f6b63;
        --line: #d8dee8;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.5rem;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 14px;
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
    <script>
      window.location.replace("http://localhost:3000");
    </script>
  </head>
  <body>
    <main>
      <h1>Opening JISOO Fanclub</h1>
      <p>
        This fanclub site runs through the Next.js dev server on port 3000.
      </p>
      <a href="http://localhost:3000">Open JISOO Fanclub</a>
    </main>
  </body>
</html>
